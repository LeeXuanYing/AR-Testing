<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marker Generator</title>

    <link rel="stylesheet" href="style.css">

    <script async src="opencv.js" onload="onOpenCvReady()"></script>
</head>

<body>

<h1>Generate AR Marker</h1>
<p id="status">Loading OpenCV...</p>

<input type="file" id="fileInput" accept="image/*">
<button id="generateBtn">Generate Features</button>

<h3>Original</h3>
<canvas id="canvasInput"></canvas>

<h3>Grayscale</h3>
<canvas id="canvasGray"></canvas>
<button id="saveGrayBtn">Save</button>

<h3>ORB Features</h3>
<canvas id="canvasORB"></canvas>
<button id="saveORBBtn">Save</button>

<br><br>
<a href="ar.html">
    <button>Open AR Camera</button>
</a>

<script src="script.js"></script>

</body>
</html>
