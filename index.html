<body>

<h1>Feature-Based AR Web App</h1>

<div class="container">

    <div class="controls">
        <input type="file" id="uploadImage">

        <br>

        <script src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady();"></script>
        <button onclick="saveImage()">Save Image</button>

        <br>

        <select id="objectSelector">
            <option value="box">Cube</option>
            <option value="sphere">Sphere</option>
            <option value="cone">Cone</option>
        </select>
    </div>

    <canvas id="canvasOutput"></canvas>

</div>

<!-- AR Scene -->
<a-scene embedded arjs>
    <a-marker type="pattern" url="pattern-raemz.patt">
        <a-entity id="arObject" position="0 0.5 0"></a-entity>
    </a-marker>
    <a-entity camera></a-entity>
</a-scene>
    
</body>
