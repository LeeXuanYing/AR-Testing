<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Feature-based Tracker</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ✅ OpenCV (calls function from script.js) -->
    <script async src="opencv.js" onload="onOpenCvReady()"></script>

    <!-- ✅ A-Frame (ONLY ONCE) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- ✅ AR.js (ONLY ONCE) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <div class="container">

        <h1>AR Feature-based Marker Tracker</h1>
        <p id="status">Loading OpenCV...</p>

        <!-- Controls -->
        <div class="controls">
            <input type="file" id="fileInput" accept="image/*">
            <button id="generateBtn">Generate Features</button>
        </div>

        <!-- Canvas -->
        <canvas id="canvasOutput"></canvas>

        <!-- AR Section -->
        <h2>AR Scene</h2>

        <div class="ar-container">
            <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

                <!-- ✅ MAKE SURE marker.patt EXISTS -->
                <a-marker type="pattern" url="marker.patt">

                    <!-- Cube -->
                    <a-box id="cube"
                           position="0 0.5 0"
                           color="#4CC3D9"
                           visible="true">
                    </a-box>

                    <!-- Sphere -->
                    <a-sphere id="sphere"
                              position="0 0.5 0"
                              radius="0.4"
                              color="#EF2D5E"
                              visible="false">
                    </a-sphere>

                    <!-- Cone -->
                    <a-cone id="cone"
                            position="0 0.5 0"
                            radius-bottom="0.4"
                            height="0.8"
                            color="#FFC65D"
                            visible="false">
                    </a-cone>

                </a-marker>

                <a-entity camera></a-entity>
            </a-scene>
        </div>

    </div>

    <!-- ✅ Your JS LAST -->
    <script src="script.js"></script>
</body>
</html>
