<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Feature-based Tracker</title>

    <link rel="stylesheet" href="style.css">

    <!-- OpenCV -->
    <script async src="opencv.js" onload="onOpenCvReady()"></script>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body>
    <div class="container">

        <h1>AR Feature-based Marker Tracker</h1>
        <p id="status">Loading OpenCV...</p>

        <!-- Controls -->
        <div class="controls">
            <input type="file" id="fileInput" accept="image/*">
            <button id="generateBtn">Generate Features</button>
        </div>

        <!-- Image Processing -->
        <h2>Image Processing</h2>

        <div class="canvas-grid">

    <div>
        <h3>Original</h3>
        <canvas id="canvasInput"></canvas>
    </div>

    <div>
        <h3>Grayscale</h3>
        <canvas id="canvasGray"></canvas>
        <br>
        <button onclick="saveImage('canvasGray', 'grayscale.png')">
            Save Grayscale
        </button>
    </div>

    <div>
        <h3>ORB Features</h3>
        <canvas id="canvasOutput"></canvas>
        <br>
        <button onclick="saveImage('canvasOutput', 'orb_features.png')">
            Save ORB Features
        </button>
    </div>

</div>

        <!-- AR Section -->
        <h2>AR Scene</h2>

        <div class="ar-container">
            <div class="ar-wrapper">
                <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

                    <a-marker type="pattern" url="marker.patt">

                        <a-box id="cube" position="0 0.5 0" color="#4CC3D9"></a-box>

                        <a-sphere id="sphere" position="0 0.5 0"
                                  radius="0.4" color="#EF2D5E"
                                  visible="false"></a-sphere>

                        <a-cone id="cone" position="0 0.5 0"
                                radius-bottom="0.4" height="0.8"
                                color="#FFC65D"
                                visible="false"></a-cone>

                    </a-marker>

                    <a-entity camera></a-entity>
                </a-scene>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
