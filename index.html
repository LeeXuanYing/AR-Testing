<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Feature-based Tracker</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load local OpenCV.js -->
    <script src="opencv.js" onload="onOpenCvReady();"></script>

    <!-- A-Frame + AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <div class="container">
        <h1>AR Feature-based Marker Tracker</h1>
        <p id="status">Loading OpenCV...</p>

        <div class="controls">
            <input type="file" id="fileInput" accept="image/*">
            <button id="generateBtn">Generate Features</button>
        </div>

        <canvas id="canvasOutput"></canvas>

        <h2>AR Scene</h2>
        <a-scene embedded arjs>
            <a-marker type="pattern" url="marker.patt">
                <a-box position="0 0.5 0" rotation="0 45 0" color="#4CC3D9" scale="0.5 0.5 0.5"></a-box>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script src="script.js"></script>
</body>
</html>
