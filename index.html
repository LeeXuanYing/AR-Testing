<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Feature-based Tracker</title>

    <link rel="stylesheet" href="style.css">

    <!-- OpenCV -->
    <script async src="opencv.js" onload="onOpenCvReady()"></script>

    <!-- A-Frame (not needed here but safe to keep) -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js (NOT needed in index page, but keeping won't break) -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body>

<div class="container">

    <h1>AR Feature-based Marker Tracker</h1>
    <p id="status">Loading OpenCV...</p>

    <!-- Controls -->
    <div class="controls">
        <input type="file" id="fileInput" accept="image/*">
        <button id="generateBtn">Generate Features</button>
    </div>

    <!-- Image Processing -->
    <h2>Image Processing</h2>

    <div class="canvas-grid">

        <div class="canvas-item">
            <h3>Original</h3>
            <canvas id="canvasInput"></canvas>
        </div>

        <div class="canvas-item">
            <h3>Grayscale</h3>
            <canvas id="canvasGray"></canvas>
            <button id="saveGrayBtn">Save Grayscale</button>
        </div>

        <div class="canvas-item">
            <h3>ORB Features</h3>
            <!-- 🔥 IMPORTANT: match script.js ID -->
            <canvas id="canvasORB"></canvas>
            <button id="saveORBBtn">Save ORB Features</button>
        </div>

    </div>

    <!-- AR SECTION -->
    <h2>AR Scene</h2>

    <div class="ar-section">
        <a href="ar.html">
            <button>Open AR Camera</button>
        </a>
    </div>

</div>

<!-- JS LAST -->
<script src="script.js"></script>

</body>
</html>
