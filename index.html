<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Custom Feature Tracking AR</title>
    <link rel="stylesheet" href="style.css">

    <!-- OpenCV -->
    <script async src="opencv.js"></script>
</head>

<body>

<h2>Custom Feature Detection & Tracking (No ORB)</h2>

<p id="status">Loading OpenCV...</p>

<!-- Upload -->
<input type="file" id="imageInput">

<br><br>

<div class="canvas-container">

    <div>
        <h3>Original</h3>
        <canvas id="canvasInput"></canvas>
    </div>

    <div>
        <h3>Grayscale</h3>
        <canvas id="canvasGray"></canvas>
        <br>
        <button onclick="processGray()">Convert</button>
        <button onclick="saveImage('canvasGray','gray.png')">Save</button>
    </div>

    <div>
        <h3>Feature Tracking</h3>
        <canvas id="canvasOutput"></canvas>
        <br>
        <button onclick="customFeatureTracking()">Start Tracking</button>
        <button onclick="saveImage('canvasOutput','tracking.png')">Save</button>
    </div>

</div>

<br>

<h3>Generate Feature Marker</h3>
<button id="generateMarkerBtn">Generate Marker</button>
<br><br>
<canvas id="canvasMarker"></canvas>
<br>
<button id="saveMarkerBtn">Save Marker</button>

<script src="script.js"></script>

</body>
</html>
